name: CCO 3-day refresh

# Runs the FieldWork content engine in the cloud every 3 days (no laptop needed).
# Incremental scrape: only the last few days of reels are pulled and merged into
# the rolling history committed in engine/output/outliers-raw.json (cheap + fast).
# Regenerated data is committed back; Vercel auto-deploys main to cco-cmndshft.
on:
  schedule:
    - cron: "0 13 */3 * *"   # every 3 days, 13:00 UTC
  workflow_dispatch: {}

concurrency:
  group: cco-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r engine/requirements.txt

      - name: Run engine pipeline (incremental)
        working-directory: engine/scripts/collectors
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GOOGLE_AI_STUDIO_KEY: ${{ secrets.GOOGLE_AI_STUDIO_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          META_GRAPH_TOKEN: ${{ secrets.META_GRAPH_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          CCO_DASH_DIR: ${{ github.workspace }}
        run: |
          set +e
          python instagram_outliers.py --mode incremental
          python saved_reference.py
          python outlier_recommend.py
          python tag_belief.py
          python belief_score.py
          python analytics.py
          python graph_insights.py
          python build_market_trends.py
          python generate_research.py
          set -e
          python build_dashboard_data.py   # must succeed (produces library.json + dashboard-data.json)

      - name: Commit refreshed data + history (Vercel auto-deploys main)
        run: |
          git config user.name "cco-refresh-bot"
          git config user.email "cco-refresh-bot@users.noreply.github.com"
          git add src/data public/outlier-thumbs public/research-thumbs public/analytics-thumbs engine/output/outliers-raw.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "CCO auto-refresh $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git push
          fi
