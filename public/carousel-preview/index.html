<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carousel Preview — 5 AI Skills Every Business Owner Needs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0e0e;
    color: #fff;
    font-family: -apple-system, system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #cafd00;
    text-align: center;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 24px;
    text-align: center;
  }
  .carousel-container {
    width: 100%;
    max-width: 420px;
    position: relative;
    touch-action: pan-y;
  }
  .carousel-track {
    display: flex;
    overflow-x: scroll;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    gap: 0;
    border-radius: 12px;
  }
  .carousel-track::-webkit-scrollbar { display: none; }
  .carousel-slide {
    flex: 0 0 100%;
    scroll-snap-align: start;
  }
  .carousel-slide img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
  }
  .dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 16px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #333;
    transition: background 0.2s, transform 0.2s;
  }
  .dot.active {
    background: #cafd00;
    transform: scale(1.3);
  }
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 420px;
    margin-top: 16px;
  }
  .nav-btn {
    background: #1a1919;
    border: 1px solid #333;
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .nav-btn:hover { border-color: #cafd00; }
  .counter {
    font-size: 14px;
    color: #888;
    margin-top: 12px;
  }
  .info {
    margin-top: 24px;
    padding: 16px;
    background: #1a1919;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    max-width: 420px;
    width: 100%;
  }
  .info h3 { font-size: 14px; color: #cafd00; margin-bottom: 6px; }
  .info p { font-size: 13px; color: #aaa; line-height: 1.5; }
  .badge {
    display: inline-block;
    background: #cafd00;
    color: #0e0e0e;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 4px;
    margin-right: 8px;
  }
</style>
</head>
<body>

<h1>CMNDSHFT Carousel Preview</h1>
<p class="subtitle">Swipe to preview — 10 slides</p>

<div class="carousel-container">
  <div class="carousel-track" id="track">
    <div class="carousel-slide"><img src="slide-01.png" alt="Slide 1"></div>
    <div class="carousel-slide"><img src="slide-02.png" alt="Slide 2"></div>
    <div class="carousel-slide"><img src="slide-03.png" alt="Slide 3"></div>
    <div class="carousel-slide"><img src="slide-04.png" alt="Slide 4"></div>
    <div class="carousel-slide"><img src="slide-05.png" alt="Slide 5"></div>
    <div class="carousel-slide"><img src="slide-06.png" alt="Slide 6"></div>
    <div class="carousel-slide"><img src="slide-07.png" alt="Slide 7"></div>
    <div class="carousel-slide"><img src="slide-08.png" alt="Slide 8"></div>
    <div class="carousel-slide"><img src="slide-09.png" alt="Slide 9"></div>
    <div class="carousel-slide"><img src="slide-10.png" alt="Slide 10"></div>
  </div>
</div>

<div class="dots" id="dots"></div>
<p class="counter" id="counter">1 / 10</p>

<div class="nav-buttons">
  <button class="nav-btn" onclick="prev()">← Prev</button>
  <button class="nav-btn" onclick="next()">Next →</button>
</div>

<div class="info">
  <h3>Carousel Details</h3>
  <p>
    <span class="badge">AI SHIFT</span>
    <span class="badge">KEYWORD: THREE</span>
  </p>
  <p style="margin-top:8px;">Topic: 5 AI Skills Every Business Owner Needs<br>
  Format: Instagram 1080x1350 (4:5)<br>
  Style: Clean<br>
  Generated by CMNDSHFT Carousel Machine</p>
</div>

<script>
const track = document.getElementById('track');
const dotsContainer = document.getElementById('dots');
const counter = document.getElementById('counter');
const total = 10;
let current = 0;

// Create dots
for (let i = 0; i < total; i++) {
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goTo(i);
  dotsContainer.appendChild(dot);
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.className = 'dot' + (i === current ? ' active' : '');
  });
  counter.textContent = (current + 1) + ' / ' + total;
}

function goTo(index) {
  current = index;
  track.scrollTo({ left: track.clientWidth * current, behavior: 'smooth' });
  updateDots();
}

function next() { goTo(Math.min(current + 1, total - 1)); }
function prev() { goTo(Math.max(current - 1, 0)); }

// Detect swipe position
track.addEventListener('scroll', () => {
  const newIndex = Math.round(track.scrollLeft / track.clientWidth);
  if (newIndex !== current) {
    current = newIndex;
    updateDots();
  }
});
</script>

</body>
</html>
